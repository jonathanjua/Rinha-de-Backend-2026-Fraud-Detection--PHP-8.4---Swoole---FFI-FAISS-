# ─────────────────────────────────────────────────────────────
# nginx.conf — Load balancer round-robin pra api1/api2.
#
# Pontos críticos pra performance:
#   - keepalive entre nginx e upstream (evita handshake TCP por request)
#   - access_log off (I/O em hot path = morte)
#   - reuseport (cada worker do nginx tem sua própria fila accept)
#   - epoll + multi_accept
# ─────────────────────────────────────────────────────────────

# Fixo em 1 worker — limite de 30 MB do container não comporta "auto"
# em hosts com muitos cores (OOM killer mata os workers extras).
worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log  /dev/stderr warn;

    sendfile           on;
    tcp_nodelay        on;
    tcp_nopush         on;
    keepalive_timeout  75s;
    keepalive_requests 100000;

    # Buffers reduzidos (payload é pequeno, evita alocação grande à toa)
    client_body_buffer_size 8k;
    client_max_body_size    16k;

    # Unix socket via volume compartilhado: elimina handshake TCP +
    # encapsulamento IP loopback. Round-robin entre os dois sockets.
    upstream api {
        server unix:/sockets/api1.sock max_fails=0;
        server unix:/sockets/api2.sock max_fails=0;
        keepalive          64;
        keepalive_requests 100000;
        keepalive_timeout  75s;
    }

    server {
        listen 9999 default_server reuseport backlog=8192;

        # /health do nginx em si (opcional, útil pra debug)
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_buffering    off;
            proxy_request_buffering off;

            # Timeouts agressivos — fraud_score deve responder em ms
            proxy_connect_timeout 1s;
            proxy_send_timeout    3s;
            proxy_read_timeout    3s;
        }
    }
}
