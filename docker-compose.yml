# ─────────────────────────────────────────────────────────────
# Rinha de Backend — Fraud Detection API (PHP 8.4 + Swoole + FFI/FAISS)
#
# Orçamento:  1.00 CPU / 350 MB total
#   nginx       0.10 CPU /  10 MB   (load balancer round-robin, 1 worker)
#   api1        0.45 CPU / 170 MB   (PHP+Swoole+FAISS via FFI)
#   api2        0.45 CPU / 170 MB   (idem)
#
# nginx ↔ api: unix socket via volume `sockets` compartilhado.
# Index FAISS (~43 MB) + bitmap (~375 KB) baked na imagem em /data/
# e carregados via mmap (page cache do kernel = uma cópia em RAM).
# ─────────────────────────────────────────────────────────────

x-api-defaults: &api-defaults
  image: ${IMAGE:-rinha-fraud-php:latest}
  build:
    context: .
    dockerfile: Dockerfile.api
  volumes:
    - sockets:/sockets
  networks:
    - app
  ulimits:
    nofile:
      soft: 65536
      hard: 65536
  healthcheck:
    # Conecta no unix socket e verifica que o server aceita conexão.
    # $$ pra escapar variable substitution do compose.
    test:
      - CMD
      - php
      - -r
      - $$s=@stream_socket_client('unix://'.getenv('SOCKET_PATH'),$$e,$$m,1);exit($$s?0:1);
    interval: 3s
    timeout: 2s
    retries: 30
    start_period: 5s

services:
  api1:
    <<: *api-defaults
    hostname: api1
    environment:
      INDEX_PATH:    /data/index.faiss
      LABELS_PATH:   /data/labels.bin
      MCC_RISK_PATH: /data/mcc_risk.json
      SOCKET_PATH:   /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170MB"

  api2:
    <<: *api-defaults
    hostname: api2
    environment:
      INDEX_PATH:    /data/index.faiss
      LABELS_PATH:   /data/labels.bin
      MCC_RISK_PATH: /data/mcc_risk.json
      SOCKET_PATH:   /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "170MB"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10MB"

networks:
  app:
    driver: bridge

volumes:
  sockets:
